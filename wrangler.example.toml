name = "apple-store-scraper"
main = "src/index.js"
compatibility_date = "2024-03-30"
compatibility_flags = ["nodejs_compat"]

# API_KEY is set via `wrangler secret put API_KEY` (production)
# For local dev, copy this file to wrangler.toml and add:
#   [vars]
#   API_KEY = "your-dev-key"

# Workers Sites 配置
[site]
bucket = "./frontend"

# KV 命名空間配置
[[kv_namespaces]]
binding = "APPLE_STORE_DATA"
id = "14de583f3a6c49c38b042f9b2aad90f4"
preview_id = "e50f6ae2f91a42e3968f806689c194bc"

# R2 儲存桶配置
[[r2_buckets]]
binding = "APPLE_STORE_DATA_BUCKET"
bucket_name = "apple-store-data"
preview_bucket_name = "apple-store-data-dev"

# Cron 觸發器 (每天午夜 UTC 執行)
[triggers]
crons = ["0 0 * * *"]
